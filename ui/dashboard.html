<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanFeed Dashboard</title>
  <style>
    :root {
      --bg:          #111113;
      --surface:     #18181b;
      --surface-soft:#1f1f23;
      --border:      #2a2a2f;
      --text:        #f0ede8;
      --desc:        #7d7975;
      --muted:       #5a5a62;
      --dim:         #3e3e46;
      --gold:        #d4a84b;
      --gold-soft:   rgba(212,168,75,0.13);
      --ok:          #5ec26b;
      --warn:        #e59a67;
      --radius:      10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input { font: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ── Page ── */
    .page {
      max-width: 1540px;
      margin: 0 auto;
      padding: 14px 22px 48px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
    }

    .hero-title {
      margin-top: 4px;
      max-width: 680px;
      font-size: 42px;
      font-weight: 700;
      line-height: 1.03;
      letter-spacing: -1.2px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .hero-title .hero-logo {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      overflow: hidden;
      display: inline-grid;
      place-items: center;
      background: transparent;
      flex-shrink: 0;
    }

    .hero-title .hero-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .hero-title span {
      color: var(--gold);
    }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .stat-card {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.08;
    }

    .stat-value.gold { color: var(--gold); }
    .stat-value.warn { color: var(--warn); }

    .stat-label {
      margin-top: 5px;
      font-size: 11px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Controls grid ── */
    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
      align-items: start;
    }

    /* ── Platform card ── */
    .platform-card {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .platform-card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-soft);
    }

    .platform-card-head img {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }

    .platform-icon-wrap {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .platform-card-title {
      flex: 1;
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: -0.1px;
    }

    .platform-card-count {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.2px;
    }

    .lock-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--dim);
      cursor: pointer;
      font-size: 13px;
      padding: 3px 8px;
      flex-shrink: 0;
      line-height: 1.2;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .lock-btn:hover:not(:disabled) {
      color: var(--gold);
      border-color: var(--gold);
      background: var(--gold-soft);
    }

    .lock-btn.lock-btn-active { color: var(--gold); border-color: rgba(212,168,75,0.4); }
    .lock-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    .drag-handle {
      color: var(--dim);
      font-size: 12px;
      cursor: grab;
      flex-shrink: 0;
      user-select: none;
      opacity: 0.4;
      transition: opacity 0.15s;
    }

    .platform-card-head:hover .drag-handle { opacity: 0.9; }
    .platform-card.dragging { opacity: 0.3; }
    .platform-card.drag-over {
      position: relative;
      overflow: hidden;
    }
    .platform-card.drag-over::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--gold);
      pointer-events: none;
    }

    .platform-card-disabled {
      opacity: 0.55;
      filter: grayscale(0.25) brightness(0.92);
      pointer-events: none;
    }
    .platform-card-disabled .platform-card-head,
    .platform-card-disabled .setting-row {
      background: rgba(255,255,255,0.02);
    }

    /* ── Setting row ── */
    .setting-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      transition: background 0.12s;
    }

    .setting-row:hover { background: var(--surface-soft); }

    .setting-copy { flex: 1; min-width: 0; }

    .setting-name {
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: -0.1px;
    }

    .setting-desc {
      margin-top: 2px;
      font-size: 11.5px;
      color: var(--desc);
      line-height: 1.45;
    }

    /* ── Toggle ── */
    .switch {
      position: relative;
      width: 36px;
      min-width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .switch input:disabled + .slider { opacity: 0.35; cursor: not-allowed; }

    .slider {
      position: absolute;
      inset: 0;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 999px;
      transition: background 0.18s, border-color 0.18s;
    }

    .slider::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #3d3e44;
      transition: transform 0.18s, background 0.18s;
    }

    .switch input:checked + .slider {
      background: var(--gold);
      border-color: transparent;
    }

    .switch input:checked + .slider::before {
      transform: translateX(16px);
      background: #1a1407;
    }

    /* ── Key button ── */
    .key-btn {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      min-width: 42px;
      height: 34px;
      padding: 0 10px;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      font-family: ui-monospace, "JetBrains Mono", monospace;
      letter-spacing: -0.5px;
    }

    .key-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-soft);
    }

    .key-btn.listening {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-soft);
      min-width: 140px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.4px;
      font-family: inherit;
    }

    /* ── Speed section ── */
    .speed-section {
      margin-top: 18px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: stretch;
    }

    .step-control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .step-control-row {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .step-display {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 700;
      width: 52px;
      height: 34px;
      display: grid;
      place-items: center;
      font-family: ui-monospace, "JetBrains Mono", monospace;
      letter-spacing: -0.3px;
    }

    .step-adj {
      width: 26px;
      height: 34px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }

    .step-adj:hover {
      color: var(--gold);
      border-color: var(--gold);
      background: var(--gold-soft);
    }

    .field-hint {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.2px;
      text-align: center;
      white-space: nowrap;
    }

    .key-control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    /* ── About / Credits ── */
    .about-grid {
      margin-top: 16px;
    }

    .about-card {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .about-card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    .about-card-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
    }

    .about-card-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: #f0f0f0;
    }

    .about-card-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .credit-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: none;
      border-right: 1px solid var(--border);
      background: transparent;
      transition: background 0.15s;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
    }

    .credit-link:last-child { border-right: none; }
    .credit-link:hover { background: rgba(212,168,75,0.04); }
    .credit-link:hover .credit-arrow { color: var(--gold); }

    .credit-icon {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .credit-icon-gh { background: #1a1a1f; border: 1px solid rgba(255,255,255,0.1); }
    .credit-icon-li { background: #0a66c2; }

    .credit-text { flex: 1; min-width: 0; }

    .credit-text strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.1px;
    }

    .credit-text span {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    .credit-arrow { color: var(--muted); font-size: 14px; flex-shrink: 0; transition: color 0.15s; }

    /* ── Responsive ── */
    @media (max-width: 1180px) {
      .stats-grid, .controls { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 720px) {
      .page { padding: 20px 16px 32px; }
      .hero-title { font-size: 34px; }
      .stats-grid, .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="eyebrow">Your feeds, <span>on your terms.</span></div>
    <h1 class="hero-title">
      <span class="hero-logo"><img src="../assets/logo.png" alt="CleanFeed" /></span>
      CleanFeed
    </h1>

    <section class="stats-grid" id="stats-grid"></section>
    <section class="controls"   id="controls-grid"></section>
    <section class="speed-section" id="speed-section"></section>

    <section class="about-grid">
      <div class="about-card">
        <div class="about-card-head">
          <span class="about-card-title">Credits</span>
        </div>
        <div class="about-card-links">
      <a class="credit-link" href="#" id="dashboard-linkedin">
        <div class="credit-icon credit-icon-li">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff">

          </svg>
        </div>
        <div class="credit-text">
          <strong>LinkedIn</strong>
          <span>linkedin.com/in/mesonero</span>
        </div>
        <span class="credit-arrow">↗</span>
      </a>
      <a class="credit-link" href="#" id="dashboard-github">
        <div class="credit-icon credit-icon-gh">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="#f4efe3">

          </svg>
        </div>
        <div class="credit-text">
          <strong>GitHub</strong>
          <span>github.com/mmesonero</span>
        </div>
        <span class="credit-arrow">↗</span>
      </a>
        </div>
      </div>
    </section>
  </main>

  <script src="../shared.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
